  /v1/qr-code/decode:
    post:
      tags:
        - Pagar QR Code
      summary: 1. Decodifica BR Code Pix
      description: >-
        Primeiro passo do fluxo **Pagar QR Code**: interpreta o BR Code (copia e cola) e devolve valor, beneficiário,
        instituição e um **`id`** — envie esse `id` em **`POST /v1/payouts/qr-code`** como **`qrCodeDecodeId`** para correlacionar com esta decodificação.
      operationId: post_v1_qr_code_decode
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XPixAccountId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pixCopyAndPaste:
                  type: string
                  minLength: 20
                  maxLength: 2000
                paymentDate:
                  type: string
                  pattern: ^\d{4}-\d{2}-\d{2}$
              required:
                - pixCopyAndPaste
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  pixCopyAndPaste:
                    type: string
                  pixKey:
                    nullable: true
                    type: string
                  pixKeyType:
                    nullable: true
                    type: string
                  amountCents:
                    nullable: true
                    type: string
                    pattern: ^-?\d+$
                    format: int64-string
                    description: BigInt serializado como string decimal (Fastify default + convenção da plataforma).
                  isAmountEditable:
                    type: boolean
                  receiverName:
                    nullable: true
                    type: string
                  receiverDocument:
                    nullable: true
                    type: string
                  institutionName:
                    nullable: true
                    type: string
                  expiresAt:
                    nullable: true
                    type: string
                    format: date-time
                    pattern: >-
                      ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  cached:
                    type: boolean
                required:
                  - id
                  - pixCopyAndPaste
                  - pixKey
                  - pixKeyType
                  - amountCents
                  - isAmountEditable
                  - receiverName
                  - receiverDocument
                  - institutionName
                  - expiresAt
                  - cached
                additionalProperties: {}
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/DomainError'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/payouts/qr-code:
    post:
      tags:
        - Pagar QR Code
      summary: 2. Pagar QR Code
      description: >-
        Segundo passo do fluxo **Pagar QR Code**, após **`POST /v1/qr-code/decode`**. Envia o Pix usando o BR Code
        (copia e cola) e **`amountCents`**. Use **`qrCodeDecodeId`** com o `id` retornado na decodificação — mesma semântica de liquidação que **`POST /v1/payouts`** por chave (webhook `pix.payout.*`, polling em **`GET /v1/payouts/{id}`**).
      operationId: post_v1_payouts_qr_code
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XPixAccountId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pixCopyAndPaste:
                  type: string
                  minLength: 20
                  maxLength: 2000
                amountCents:
                  anyOf:
                    - type: string
                    - type: number
                description:
                  type: string
                  maxLength: 256
                qrCodeDecodeId:
                  type: string
                  minLength: 10
                  maxLength: 64
              required:
                - pixCopyAndPaste
                - amountCents
      responses:
