          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  pixAccountId:
                    nullable: true
                    type: string
                  url:
                    type: string
                  events:
                    type: array
                    items:
                      type: string
                  enabled:
                    type: boolean
