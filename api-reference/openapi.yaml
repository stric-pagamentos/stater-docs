  /v1/pix-accounts/{id}/webhooks:
    post:
      tags:
        - Webhooks
      summary: Registra endpoint de webhook
      description: >-
        Cadastra uma URL para receber eventos da conta. O body `events` lista os tipos assinados — use exatamente um
        destes nomes: `pix.in.received`, `pix.payout.succeeded`, `pix.payout.failed`, `pix.payout.cancelled`,
        `pix.payout.refunded`, `pix.charge.paid`, `pix.charge.expired`, `pix.charge.refunded` (os `pix.payout.*` são o ciclo da transferência Pix enviada — o nome do evento na API permanece `pix.payout.*`). Payloads e headers de
        cada entrega: corpo JSON `{ "event": "<tipo>", "data": { ... } }`, header `webhook-event-type` igual a `event`
        — detalhes no guia Webhooks.
      operationId: post_v1_pix_accounts_id_webhooks
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            minLength: 10
            maxLength: 64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  minLength: 8
                  maxLength: 2048
                events:
                  minItems: 1
                  maxItems: 50
                  type: array
                  description: >-
                    Strings exatamente iguais às disponíveis na plataforma; use uma ou várias conforme sua necessidade.
                  items:
                    type: string
                    enum:
                      - pix.in.received
                      - pix.payout.succeeded
                      - pix.payout.failed
                      - pix.payout.cancelled
                      - pix.payout.refunded
                      - pix.charge.paid
                      - pix.charge.expired
                      - pix.charge.refunded
                authToken:
                  anyOf:
                    - type: string
                      minLength: 1
                      maxLength: 500
                    - type: string
                      nullable: true
                      enum:
                        - null
              required:
                - url
                - events
