openapi: 3.0.3
info:
  title: Stric Platform API
  version: 0.1.0
  description: >-
    API Pix da Stric. Autenticação via Bearer token (API key). Valores monetários são enviados e recebidos como string
    em centavos.
servers:
  - url: https://stater.stric.io
    description: production
  - url: http://localhost:3031
    description: local dev
tags:
  - name: Account
    description: Atalhos para a conta resolvida pela API key — comece por aqui.
  - name: Movements
    description: Saldo, extrato e consulta de movimentos.
  - name: Charges
    description: Cobranças Pix — criar, listar, consultar e refresh (receber Pix).
  - name: Inbox
    description: Pix recebidos na conta.
  - name: DICT
    description: Consulta de chaves Pix (lookup de titular, banco, agência).
  - name: QR Code
    description: Decodificação de BR Code Pix.
  - name: Payouts
    description: Pagamentos Pix enviados via chave ou QR Code.
  - name: Pix accounts
    description: Consulta de contas Pix por id (tarifas, limites, rate limit).
  - name: API keys (per-account)
    description: Gerenciamento de chaves de API vinculadas à conta.
  - name: Outbound webhooks (per-account)
    description: Endpoints de webhook da conta (recebem eventos).
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: 'API key da plataforma. Envie no header `Authorization: Bearer <key>`.'
  parameters:
    XPixAccountId:
      name: X-Pix-Account-Id
      in: header
      required: false
      description: >-
        Id da conta Pix sobre a qual a operação atua. Obrigatório quando sua API key não está vinculada a uma conta
        específica.
      schema:
        type: string
        minLength: 10
        maxLength: 40
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: >-
        Chave única para deduplicar requests. Repetir a mesma chave (mesmo método, path e body) retorna a resposta
        original — útil para retry seguro. Conflito de body com chave repetida → 409.
      schema:
        type: string
        minLength: 8
        maxLength: 64
  responses:
    ValidationError:
      description: 400 — corpo, query ou parâmetros inválidos. Veja `error.details` pra campos com problema.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 401 — API key ausente, malformada, expirada ou revogada.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: 403 — você não tem permissão pra essa operação ou pro recurso especificado.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 404 — recurso não encontrado. `error.code` indica qual.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    DomainError:
      description: 422 — operação rejeitada por regra de negócio (saldo insuficiente, estado incompatível, etc.).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimitExceeded:
      description: 429 — limite de requests excedido. Tente novamente após `Retry-After` segundos.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Segundos até poder tentar de novo.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: 500 — erro inesperado.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: 'Código de erro estável (ex: `VALIDATION_ERROR`, `INSUFFICIENT_BALANCE`).'
            message:
              type: string
              description: Descrição human-readable do erro.
            details:
              type: object
              description: Detalhes contextuais (campos com problema, valores, etc.). Opcional.
              additionalProperties: true
paths:
  /v1/dict/lookup:
    post:
      tags:
        - DICT
      summary: Consulta DICT por chave Pix
      description: >-
        Resolve titular, banco, agência e conta de uma chave Pix. O `id` retornado pode ser passado em `POST
        /v1/payouts` (campo `dictLookupId`) pra associar o lookup ao pagamento.
      operationId: post_v1_dict_lookup
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XPixAccountId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pixKey:
                  type: string
                  minLength: 1
                  maxLength: 200
                pixKeyType:
                  type: string
                  enum:
                    - CPF
                    - CNPJ
                    - EMAIL
                    - PHONE
                    - EVP
              required:
                - pixKey
                - pixKeyType
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  key:
                    type: string
                  keyType:
                    type: string
                    enum:
                      - CPF
                      - CNPJ
                      - EMAIL
                      - PHONE
                      - EVP
                  owner:
                    type: object
                    properties:
                      name:
                        nullable: true
                        type: string
                      document:
                        nullable: true
                        type: string
                    required:
                      - name
                      - document
                  bankName:
                    nullable: true
                    type: string
                  ispb:
                    nullable: true
                    type: string
                  branch:
                    nullable: true
                    type: string
                  account:
                    nullable: true
                    type: string
                  accountType:
                    nullable: true
                    type: string
                  cached:
                    type: boolean
                required:
                  - id
                  - key
                  - keyType
                  - owner
                  - bankName
                  - ispb
                  - branch
                  - account
                  - accountType
                  - cached
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/DomainError'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/qr-code/decode:
    post:
      tags:
        - QR Code
      summary: Decodifica BR Code Pix
      description: >-
        Faz parse de um BR Code (copy-and-paste) e retorna chave, valor, beneficiário e instituição. O `id` retornado
        pode ser passado em `POST /v1/payouts/qr-code` (campo `qrCodeDecodeId`).
      operationId: post_v1_qr_code_decode
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XPixAccountId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pixCopyAndPaste:
                  type: string
                  minLength: 20
                  maxLength: 2000
                paymentDate:
                  type: string
                  pattern: ^\d{4}-\d{2}-\d{2}$
              required:
                - pixCopyAndPaste
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  pixCopyAndPaste:
                    type: string
                  pixKey:
                    nullable: true
                    type: string
                  pixKeyType:
                    nullable: true
                    type: string
                  amountCents:
                    nullable: true
                    type: string
                    pattern: ^-?\d+$
                    format: int64-string
                    description: BigInt serializado como string decimal (Fastify default + convenção da plataforma).
                  isAmountEditable:
                    type: boolean
                  receiverName:
                    nullable: true
                    type: string
                  receiverDocument:
                    nullable: true
                    type: string
                  institutionName:
                    nullable: true
                    type: string
                  expiresAt:
                    nullable: true
                    type: string
                    format: date-time
                    pattern: >-
                      ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  cached:
                    type: boolean
                required:
                  - id
                  - pixCopyAndPaste
                  - pixKey
                  - pixKeyType
                  - amountCents
                  - isAmountEditable
                  - receiverName
                  - receiverDocument
                  - institutionName
                  - expiresAt
                  - cached
                additionalProperties: {}
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/DomainError'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/charges:
    post:
      tags:
        - Charges
      summary: Cria cobrança Pix
      description: |-
        Gera um QR Code Pix com TXID único. Três variantes via discriminator `variant`:
        - `simple`: QR estático, sem pagador definido.
        - `debtor`: QR com nome e documento do pagador.
        - `cobv`: QR com vencimento (`dueDate`) e multa (`fine`/`typeFine`).

        A resposta inclui `txid`, `brCode` e `imageBase64` ou `imageUrl`.
      operationId: post_v1_charges
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XPixAccountId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  properties:
                    variant:
                      type: string
                      enum:
                        - simple
                    amountCents:
                      anyOf:
                        - type: string
                        - type: number
                    base64Image:
                      type: boolean
                    tag:
                      type: string
                      minLength: 1
                      maxLength: 200
                    expirationDate:
                      type: string
                      format: date-time
                      pattern: >-
                        ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  required:
                    - variant
                    - amountCents
                - type: object
                  properties:
                    variant:
                      type: string
                      enum:
                        - debtor
                    amountCents:
                      anyOf:
                        - type: string
                        - type: number
                    base64Image:
                      type: boolean
                    tag:
                      type: string
                      minLength: 1
                      maxLength: 200
                    expirationDate:
                      type: string
                      format: date-time
                      pattern: >-
                        ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                    debtorName:
                      type: string
                      minLength: 1
                      maxLength: 25
                    debtorDocument:
                      type: string
                      minLength: 11
                      maxLength: 20
                    debtorTypeDocument:
                      type: string
                      enum:
                        - CPF
                        - CNPJ
                  required:
                    - variant
                    - amountCents
                    - debtorName
                    - debtorDocument
                    - debtorTypeDocument
                - type: object
                  properties:
                    variant:
                      type: string
                      enum:
                        - cobv
                    amountCents:
                      anyOf:
                        - type: string
                        - type: number
                    base64Image:
                      type: boolean
                    tag:
                      type: string
                      minLength: 1
                      maxLength: 200
                    expirationDate:
                      type: string
                      format: date-time
                      pattern: >-
                        ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                    debtorName:
                      type: string
                      minLength: 1
                      maxLength: 25
                    debtorDocument:
                      type: string
                      minLength: 11
                      maxLength: 20
                    debtorTypeDocument:
                      type: string
                      enum:
                        - CPF
                        - CNPJ
                    dueDate:
                      type: string
                      format: date-time
                      pattern: >-
                        ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                    fineDate:
                      type: string
                      format: date-time
                      pattern: >-
                        ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                    typeFine:
                      type: string
                      enum:
                        - NONE
                        - VALUE
                        - PERCENT
                    fine:
                      type: number
                      minimum: 0
                  required:
                    - variant
                    - amountCents
                    - debtorName
                    - debtorDocument
                    - debtorTypeDocument
                    - typeFine
                    - fine
      responses:
        '201':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  pixAccountId:
                    type: string
                  variant:
                    type: string
                    enum:
                      - simple
                      - debtor
                      - cobv
                  status:
                    type: string
                    enum:
                      - PENDING
                      - PAID
                      - EXPIRED
                      - FAILED
                      - REFUNDED
                      - CANCELLED
                  txid:
                    type: string
                  amountCents:
                    type: string
                    pattern: ^-?\d+$
                    format: int64-string
                    description: BigInt serializado como string decimal (Fastify default + convenção da plataforma).
                  brCode:
                    nullable: true
                    type: string
                  imageBase64:
                    nullable: true
                    type: string
                  imageUrl:
                    nullable: true
                    type: string
                  expiresAt:
                    nullable: true
                    type: string
                    format: date-time
                    pattern: >-
                      ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  dueDate:
                    nullable: true
                    type: string
                    format: date-time
                    pattern: >-
                      ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  fineDate:
                    nullable: true
                    type: string
                    format: date-time
                    pattern: >-
                      ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  debtorName:
                    nullable: true
                    type: string
                  debtorDocument:
                    nullable: true
                    type: string
                  debtorTypeDocument:
                    nullable: true
                    type: string
                  typeFine:
                    nullable: true
                    type: string
                  fine:
                    nullable: true
                    type: number
                  tag:
                    nullable: true
                    type: string
                  endToEndId:
                    nullable: true
                    type: string
                  paidAt:
                    nullable: true
                    type: string
                    format: date-time
                    pattern: >-
                      ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  payerName:
                    nullable: true
                    type: string
                  payerDocument:
                    nullable: true
                    type: string
                  payerInstitution:
                    nullable: true
                    type: string
                  refundEndToEndId:
                    nullable: true
                    type: string
                  refundedAt:
                    nullable: true
                    type: string
                    format: date-time
                    pattern: >-
                      ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                  refundedAmountCents:
                    type: string
                    pattern: ^-?\d+$
                    format: int64-string
                    description: BigInt serializado como string decimal (Fastify default + convenção da plataforma).
                  failureReason:
                    nullable: true
                    type: string
                  createdAt:
                    type: string
                    format: date-time
                    pattern: >-
                      ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                required:
                  - id
                  - pixAccountId
                  - variant
                  - status
                  - txid
                  - amountCents
                  - brCode
                  - imageBase64
                  - imageUrl
                  - expiresAt
                  - dueDate
                  - fineDate
                  - debtorName
                  - debtorDocument
                  - debtorTypeDocument
                  - typeFine
                  - fine
                  - tag
                  - endToEndId
                  - paidAt
                  - payerName
                  - payerDocument
                  - payerInstitution
                  - refundEndToEndId
                  - refundedAt
                  - refundedAmountCents
                  - failureReason
                  - createdAt
                additionalProperties: {}
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/DomainError'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      tags:
        - Charges
      summary: Lista cobranças
      description: 'Paginação por cursor. Filtros: `status`, `variant`, intervalo de criação (`from`/`to`). Mais recentes primeiro.'
      operationId: get_v1_charges
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - name: to
          in: query
          required: false
          schema:
            type: string
            pattern: ^\d{4}-\d{2}-\d{2}$
        - name: status
          in: query
          required: false
          schema:
            type: string
            minLength: 1
        - name: variant
          in: query
          required: false
          schema:
            type: string
            minLength: 1
        - name: pixAccountId
          in: query
          required: false
          schema:
            type: string
            minLength: 10
            maxLength: 64
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/XPixAccountId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  charges:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        pixAccountId:
                          type: string
                        variant:
                          type: string
                          enum:
                            - simple
                            - debtor
                            - cobv
                        status:
                          type: string
                          enum:
                            - PENDING
                            - PAID
                            - EXPIRED
                            - FAILED
                            - REFUNDED
                            - CANCELLED
                        txid:
                          type: string
                        amountCents:
                          type: string
                          pattern: ^-?\d+$
                          format: int64-string
                          description: BigInt serializado como string decimal (Fastify default + convenção da plataforma).
                        brCode:
                          nullable: true
                          type: string
                        imageBase64:
                          nullable: true
                          type: string
                        imageUrl:
                          nullable: true
                          type: string
                        expiresAt:
                          nullable: true
                          type: string
                          format: date-time
                          pattern: >-
