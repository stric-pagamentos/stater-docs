          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  kind:
                    type: string
                    enum:
                      - submitted
                      - rejected
                      - submitted_unknown
                  payoutId:
                    type: string
                  status:
                    type: string
                    enum:
                      - PENDING
                      - PROCESSING
                      - SUBMITTED_UNKNOWN
                      - SUCCEEDED
                      - FAILED
                      - CANCELLED
                      - REFUNDED
                      - STUCK
                required:
                  - kind
                  - payoutId
                  - status
                additionalProperties: {}
