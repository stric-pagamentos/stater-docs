      description: >-
        Retorna nome do titular, banco e dados da conta vinculados à chave. O campo `id` da resposta pode ser enviado
        em `POST /v1/payouts` como `dictLookupId` para ligar esta consulta à transferência — na criação continuam obrigatórios
        `pixKey`, `pixKeyType` e `amountCents`.
      operationId: post_v1_dict_lookup
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XPixAccountId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pixKey:
                  type: string
                  minLength: 1
                  maxLength: 200
                pixKeyType:
                  type: string
                  enum:
                    - CPF
                    - CNPJ
                    - EMAIL
                    - PHONE
                    - EVP
              required:
                - pixKey
                - pixKeyType
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  key:
                    type: string
                  keyType:
                    type: string
                    enum:
                      - CPF
                      - CNPJ
                      - EMAIL
                      - PHONE
                      - EVP
