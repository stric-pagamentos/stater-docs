  /v1/payouts:
    post:
      tags:
        - Payouts
      summary: Envia Pix via chave
      description: |-
        Cria um pagamento Pix usando uma chave (CPF/CNPJ/email/telefone/EVP). Resultado:
        - `submitted` (200): aceito pelo Pix; status final virá via webhook ou polling.
        - `rejected` (422): rejeitado; valor não saiu do saldo.
        - `submitted_unknown` (502): resultado indeterminado (timeout); a plataforma resolve por polling.

        Passe `dictLookupId` se você consultou a chave antes — os dados do beneficiário ficam associados ao pagamento.
      operationId: post_v1_payouts
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XPixAccountId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pixKey:
                  type: string
                  minLength: 1
                  maxLength: 200
                pixKeyType:
                  type: string
                  enum:
                    - CPF
                    - CNPJ
                    - EMAIL
                    - PHONE
                    - EVP
                amountCents:
                  anyOf:
                    - type: string
                    - type: number
                description:
                  type: string
                  maxLength: 256
                dictLookupId:
                  type: string
                  minLength: 10
                  maxLength: 64
              required:
                - pixKey
                - pixKeyType
                - amountCents
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  kind:
                    type: string
                    enum:
                      - submitted
                      - rejected
                      - submitted_unknown
                  payoutId:
                    type: string
                  status:
                    type: string
                    enum:
                      - PENDING
                      - PROCESSING
                      - SUBMITTED_UNKNOWN
                      - SUCCEEDED
                      - FAILED
                      - CANCELLED
                      - REFUNDED
                      - STUCK
                required:
                  - kind
                  - payoutId
                  - status
                additionalProperties: {}
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/DomainError'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      tags:
        - Payouts
